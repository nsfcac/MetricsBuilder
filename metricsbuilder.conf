<virtualhost *:80>
    ServerName 127.0.0.1
 
    # WSGIDaemonProcess metricsbuilder user=apache group=apache threads=5 home=/home/lijie/MetricsBuilder/
    WSGIScriptAlias / /home/lijie/MetricsBuilder/metricsbuilder.wsgi
 
    <directory /home/lijie/MetricsBuilder/>
        # WSGIProcessGroup metricsbuilder
        # WSGIApplicationGroup %{GLOBAL}
        # WSGIScriptReloading On
        # Order deny,allow
        # Allow from all
        Options FollowSymLinks
        AllowOverride None
        Require all granted
    </directory>
    ErrorLog ${APACHE_LOG_DIR}/error.log
    LogLevel warn
    CustomLog ${APACHE_LOG_DIR}/access.log combined
</virtualhost>